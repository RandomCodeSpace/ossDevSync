name: Publish Beta to GitHub Packages

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  publish-beta:
    name: Publish Beta
    runs-on: ubuntu-latest
    # Only publish if CI passed AND it was a push (not PR) AND not a version bump commit
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      !contains(github.event.workflow_run.head_commit.message, 'chore: bump beta')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@randomcodespace'

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Bump beta version and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get current version
          CURRENT=$(node -p "require('./package.json').version")

          # Calculate next beta version
          if echo "$CURRENT" | grep -q "beta"; then
            # Already a beta — increment the beta number
            NEXT=$(node -p "
              const v = '$CURRENT';
              const [base, beta] = v.split('-beta.');
              base + '-beta.' + (parseInt(beta) + 1);
            ")
          else
            # Not a beta — create first beta of next patch
            NEXT=$(node -p "
              const v = '$CURRENT'.split('.');
              v[2] = parseInt(v[2]) + 1;
              v.join('.') + '-beta.0';
            ")
          fi

          echo "Publishing $NEXT"

          # Update package.json version
          npm version "$NEXT" --no-git-tag-version

          # Publish with beta tag
          npm publish --access public --tag beta

          # Commit the version bump
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump beta to $NEXT [skip ci]"
          git push
